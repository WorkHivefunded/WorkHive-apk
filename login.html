<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WORKHIVE - Login</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<div class="card">
<div class="brand-logo">
    <span class="gold">WORK</span><span class="white">HIVE</span>
</div>

<p class="brand-tagline">Premium Trading & Learning Platform</p>


</div>



<form id="loginForm">


<label>Email Address</label>

<input 
type="email"
id="loginEmail"
placeholder="Enter email"
required>



<label>Password</label>

<input 
type="password"
id="loginPassword"
placeholder="Enter password"
required>



<button type="submit">

Login

</button>



<p class="login-text">

Don't have an account?

<a href="register.html">
Create Account
</a>

</p>


</form>


</div>


</div>


<script type="module" src="auth.js"></script>


</body>

</html>
